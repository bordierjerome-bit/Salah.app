}

function buildSeq(pid) {
  const p = PRAYERS.find(x => x.id === pid);
  const voc = VOCAL_RAKAAT[pid] || [];
  const intAt = TASHAHHUD_INT[pid];
  const steps = [];
  for (let r = 1; r <= p.rakaat; r++) {
    const isVocal = voc.includes(r);
    for (const s of STEPS_BASE) {
      if (s.id === "niyya" && r !== 1) continue;
      if (s.id === "surah" && r > 2) continue;
      steps.push({...s, rakaat:r, isVocal, stepKey:`${r}-${s.id}`});
    }
    if (intAt && r === intAt && r < p.rakaat) {
      steps.push({...TD, id:"tashahhud_int", rakaat:r, isVocal:false, stepKey:`${r}-ti`, tashahudType:"intermediaire"});
      steps.push({id:"qiyam_resume",label:"Qiyām — Reprise",arabic:"قِيَام",phonetic:"Qiyām",translation:"Se relever pour la raka'at suivante",rakaat:r,isVocal:false,stepKey:`${r}-qr`,noAudio:true});
    }
  }
  steps.push({...TD, id:"tashahhud_final", rakaat:p.rakaat, isVocal:false, stepKey:"f-tf", tashahudType:"final"});
  steps.push({...SD, id:"salat_ibr", rakaat:p.rakaat, isVocal:false, stepKey:"f-si"});
  steps.push({...SLD, id:"salam", rakaat:p.rakaat, isVocal:false, stepKey:"f-sl"});
  return steps;
}

// EveryAyah.com — récitations humaines haute qualité, format : SSSAAA.mp3
function getUrls(rec, n, ayat) {
  return Array.from({length:ayat}, (_,i) =>
    `https://everyayah.com/data/${rec}/${String(n).padStart(3,"0")}${String(i+1).padStart(3,"0")}.mp3`
  );
}

function useAudio() {
  const [pid, setPid] = useState(null);
  const [rec, setRec] = useState("ar.alafasy");
  const aRef = useRef(null);
  const qRef = useRef([]);
  const iRef = useRef(0);
  const act  = useRef(null);
  useEffect(() => {
    const el = document.createElement("audio");
    el.preload = "auto";
    el.onended = () => adv();
    el.onerror = () => adv();
    aRef.current = el;
    return () => { el.pause(); el.src = ""; };
  }, []);
  function adv() {
    if (!aRef.current || iRef.current >= qRef.current.length) { doStop(); return; }
    const url = qRef.current[iRef.current++];
    aRef.current.src = url; aRef.current.load();
    aRef.current.play().catch(() => doStop());
  }
  function doStop() {
    if (aRef.current) { aRef.current.pause(); aRef.current.src = ""; }
    qRef.current = []; iRef.current = 0; act.current = null; setPid(null);
  }
  const play = useCallback((urls, id) => {
    if (act.current === id) { doStop(); return; }
    doStop(); qRef.current = urls; iRef.current = 0; act.current = id; setPid(id);
    setTimeout(() => adv(), 50);
  }, []);
  return {play, stop:doStop, playingId:pid, reciterId:rec, setReciterId:setRec};
}

  const [o, setO] = useState(false);
  return (
    <div style={{marginTop:10}}>
      <button className={`src-toggle${o?" open":""}`} onClick={() => setO(x => !x)}>
        <span className="src-ico" style={{transform:o?"rotate(90deg)":"none"}}>▶</span>
        <span className="src-lbl">SOURCES & SENS</span>
        <span className={`statut ${sc(src.statut)}`}>{src.statutLabel}</span>
      </button>
      {o && <div className="src-panel">
        <div className="src-block">
          <div className="src-block-t">📖 RÉFÉRENCE CORANIQUE</div>
          {src.quran.length ? src.quran.map((q,i) =>
            <div key={i} className="qe">
              <div className="qe-ref">{q.ref}</div>
              <div className="qe-ar">«{q.texte}»</div>
              {q.note && <div className="qe-nt">{q.note}</div>}
            </div>
          ) : <p className="no-quran">Établi exclusivement par la Sunna prophétique.</p>}
        </div>
        {src.hadith.length > 0 && <div className="src-block">
          <div className="src-block-t">📜 HADITH AUTHENTIQUES</div>
          {src.hadith.map((h,i) =>
            <div key={i} className="he">
              <div className="he-ref">{h.ref}</div>
              {h.narrateur && <div className="he-narr">Rapporté par {h.narrateur}</div>}
              <div className="he-txt">«{h.texte}»</div>
              <span className="he-gr">{h.grade}</span>
            </div>
          )}
        </div>}
        {src.geste && <div className="src-block">
          <div className="src-block-t">✦ SENS DU GESTE</div>
          <p className="ge-txt">{src.geste}</p>
        </div>}
      </div>}
    </div>
  );
}

function ABtn({urls, id, p}) {
  const pl = p.playingId === id;
  return (
    <button className={`aub${pl?" pl":""}`} onClick={() => p.play(urls, id)}>
      {pl ? <><span className="pulse"/> ARRÊTER</> : <>▶ ÉCOUTER</>}
    </button>
  );
}

function SS({rakaat, sel, onSel}) {
  const cur = sel[rakaat] || "ikhlas";
  const note = rakaat===1&&cur==="kafirun" ? "※ Pratique prophétique : Al-Kāfirūn en 1ère raka'at (Muslim n°884)"
             : rakaat===2&&cur==="ikhlas"  ? "※ Pratique prophétique : Al-Ikhlāṣ en 2ème raka'at (Muslim n°884)" : "";
  return (
    <div className="ss-wrap">
      <div className="ss-title">SOURATE — RAKA'AT {rakaat}</div>
      <div className="ss-btns">
        {Object.values(SURAHS).map(s =>
          <button key={s.id} className={`ss-btn${cur===s.id?" on":""}`} onClick={() => onSel(rakaat, s.id)}>
            <span className="ss-btn-ar">{s.arabic}</span>
            <span className="ss-btn-nm">{s.name}</span>
          </button>
        )}
      </div>
      {note && <div className="ss-note">{note}</div>}
    </div>
  );
}

  const hv = ["qiyam","surah","takbir"].includes(step.id);
  if (step.id === "surah") {
    const sid = sel[step.rakaat] || "ikhlas";
    const s = SURAHS[sid];
    const urls = getUrls(p.reciterId, s.num, s.ayat);
    const aid = `sh-${step.rakaat}-${sid}`;

      <div className="sc">
        <div className="sc-hd">

  const au = step.id==="qiyam" ? getUrls(p.reciterId, 1, 7) : null;

    <div className="sc">
      <div className="sc-hd">
        <div className="sc-hd-l">
          <span className="sc-lbl">{step.label}</span>
          {step.tashahudType==="intermediaire" && <span className="th-i">Intermédiaire</span>}

          {hv && <span className={`vb ${step.isVocal?"vh":"vl"}`}>{step.isVocal?"▲ Voix haute":"▽ Voix basse"}</span>}

        {!step.noAudio && au && <ABtn urls={au} id={step.stepKey} p={p}/>}
      </div>
      <PostureIllustration postureId={pid} gender={g}/>
      <div className="sc-ar">{step.arabic}</div>
      <div className="sc-ph">{step.phonetic}</div>
      <div className="sc-tr">{step.translation}</div>
      {step.note && <div className="sc-nt">※ {step.note}</div>}
      {step.audioNote && <div className="sc-nt">♪ {step.audioNote}</div>}
      {src && <Src src={src}/>}
    </div>
  );
}

function RefMode({pid, p, sel, onSel, g}) {
  const prayer = PRAYERS.find(x => x.id === pid);
  const seq = buildSeq(pid);
  const grp = {}; const fin = [];
  for (const s of seq) {
    if (["tashahhud_final","salat_ibr","salam"].includes(s.id)) fin.push(s);
    else { if (!grp[s.rakaat]) grp[s.rakaat] = []; grp[s.rakaat].push(s); }
  }
  return (
    <div>
      <div className="edit-warn"><strong>Note éditoriale</strong> — Références issues de Bukhārī, Muslim, Abu Dāwūd, Tirmidhī. À vérifier par un érudit qualifié avant usage pédagogique ou religieux.</div>
      {Object.entries(grp).map(([r, steps]) => {
        const iv = VOCAL_RAKAAT[pid].includes(parseInt(r));
        return (
          <div key={r} style={{marginBottom:20}}>
            <div className="section-title">Raka'at {r} / {prayer.rakaat}<span className={`vb ${iv?"vh":"vl"}`}>{iv?"▲ Voix haute":"▽ Voix basse"}</span></div>
            {steps.map((s,i) => <Card key={i} step={s} p={p} sel={sel} onSel={onSel} g={g}/>)}
          </div>
        );
      })}
      {fin.length > 0 && <div style={{marginBottom:20}}>
        <div className="section-title">Clôture de la prière</div>
        {fin.map((s,i) => <Card key={i} step={s} p={p} sel={sel} onSel={onSel} g={g}/>)}
      </div>}
    </div>
  );
}

function CompMode({pid, p, sel, onSel, g}) {
  const prayer = PRAYERS.find(x => x.id === pid);
  const seq = buildSeq(pid);
  const [idx, setIdx] = useState(0);
  const [done, setDone] = useState(false);
  useEffect(() => { p.stop(); }, [idx]);
  const go = (n) => { p.stop(); n >= 0 && n < seq.length ? setIdx(n) : setDone(true); };
  if (done) return (
    <div className="done">
      <div className="done-ar">الحمد لله</div>
      <div className="done-t">Prière accomplie</div>
      <div className="done-s">Qu'Allah accepte votre prière</div>
      <div className="orn">✦ ✦ ✦</div>
      <button className="rb-btn" onClick={() => { p.stop(); setIdx(0); setDone(false); }}>RECOMMENCER</button>
    </div>
  );
  const step = seq[idx];
  const prog = Math.round((idx / (seq.length - 1)) * 100);
  const isLast = idx === seq.length - 1;
  const hv = ["qiyam","surah","takbir"].includes(step.id);
  const srcId = step.id==="tashahhud_int" ? "tashahhud_int" : step.id==="tashahhud_final" ? "tashahhud_final" : step.id;
  const src = SOURCES[srcId];
  const postId = STEP_POSTURE[step.id] || "qiyam";
  const dots = Array.from({length:prayer.rakaat}, (_,i) => {
    const r = i + 1;
    const dn = (step.rakaat || 0) > r;
    const cr = step.rakaat === r && !["tashahhud_final","salat_ibr","salam"].includes(step.id);
    return <div key={r} className={`dot${dn?" dn":""}${cr?" cr":""}`}/>;
  });
  let body;
  if (step.id === "surah") {
    const sid = sel[step.rakaat] || "ikhlas";
    const s = SURAHS[sid];
    const urls = getUrls(p.reciterId, s.num, s.ayat);
    const aid = `sh-${step.rakaat}-${sid}`;
    body = <>
      <div className="cc-meta">
        <div className="cc-ml"><span className="cc-nm">Sourate supplémentaire</span><span style={{fontSize:".6rem",color:"var(--tx3)"}}>Raka'at {step.rakaat}</span></div>
        <ABtn urls={urls} id={aid} p={p}/>
      </div>
      <PostureIllustration postureId="qiyam" gender={g}/>
      <SS rakaat={step.rakaat} sel={sel} onSel={(r,id) => { p.stop(); onSel(r,id); }}/>
      <div className="cc-ar">{s.arabicText}</div>
      <div className="cc-ph">{s.phonetic}</div>
      <div className="cc-tr">{s.translation}</div>
      <Src src={s.sources}/>
    </>;
  } else {
    const au = step.id==="qiyam" ? getUrls(p.reciterId, 1, 7) : null;
    body = <>
      <div className="cc-meta">
        <div className="cc-ml">
          <span className="cc-nm">{step.label}</span>
          {step.tashahudType==="intermediaire" && <span className="th-i">Intermédiaire</span>}
          {step.tashahudType==="final" && <span className="th-f">Final</span>}
          {step.rakaat && !["tashahhud_final","salat_ibr","salam"].includes(step.id) && <span style={{fontSize:".6rem",color:"var(--tx3)"}}>Raka'at {step.rakaat}</span>}
        </div>
        {!step.noAudio && au && <ABtn urls={au} id={step.stepKey} p={p}/>}
      </div>
      <PostureIllustration postureId={postId} gender={g}/>
      {hv && <div className={`cv ${step.isVocal?"hi":"lo"}`}><span className="d"/>{step.isVocal?"Récitation à voix haute":"Récitation silencieuse (voix basse)"}</div>}
      <div className="cc-ar">{step.arabic}</div>
      <div className="cc-ph">{step.phonetic}</div>
      <div className="cc-tr">{step.translation}</div>
      {step.note && <div className="cc-nt">※ {step.note}</div>}
      {step.audioNote && <div className="cc-nt">♪ {step.audioNote}</div>}
      {src && <Src src={src}/>}
    </>;
  }
  return (
    <div>
      <div className="cp-prg"><div className="prg-w"><div className="prg-b" style={{width:`${prog}%`}}/></div><div className="prg-l">{idx+1} / {seq.length}</div></div>
      <div className="cp-dots">{dots}</div>
      <div className="cc">{body}</div>
      <div className="cn">
        <button className="nb" onClick={() => go(idx-1)} disabled={idx===0}>← Retour</button>
        {isLast ? <button className="nb dn2" onClick={() => setDone(true)}>Terminer ✦</button>
                : <button className="nb pr"  onClick={() => go(idx+1)}>Suivant →</button>}
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────
function App() {
  const [pid,  setPid]  = useState("fajr");
  const [mode, setMode] = useState("reference");
  const [sel,  setSel]  = useState({...DEFAULT_SURAH});
  const [ck,   setCk]   = useState(0);
  const [g,    setG]    = useState("m");
  const p = useAudio();
  const sw = (m) => { p.stop(); setMode(m); setCk(k => k+1); };
  const sp = (id) => { p.stop(); setPid(id); setCk(k => k+1); };
  const os = (r, id) => { p.stop(); setSel(prev => ({...prev, [r]:id})); };
  return (
    <div>
      <div className="hdr">
        <div className="hdr-b">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
        <div className="hdr-t">Guide de Prière</div>
        <div className="hdr-s">Ṣalāh — صَلَاة</div>
      </div>
      <div className="toolbar">
        <span className="ap-lbl">RÉCITATEUR</span>
        <select className="ap-sel" value={p.reciterId} onChange={e => { p.stop(); p.setReciterId(e.target.value); }}>
          {RECITERS.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
        </select>
        <div className="gender-toggle">
          <button className={`gb${g==="m"?" on":""}`} onClick={() => setG("m")}>♂</button>
          <button className={`gb${g==="f"?" on":""}`} onClick={() => setG("f")}>♀</button>
        </div>
      </div>
      <div className="pg">
        {PRAYERS.map(x =>
          <button key={x.id} className={`pb${pid===x.id?" on":""}`} onClick={() => sp(x.id)}>
            <span className="pb-ar">{x.arabic}</span>
            <span className="pb-nm">{x.name}</span>
            <span className="pb-rk">{x.rakaat} raka'āt</span>
          </button>
        )}
      </div>
      <div className="mt">
        <button className={`mb${mode==="reference"?" on":""}`} onClick={() => sw("reference")}>RÉFÉRENCE</button>
        <button className={`mb${mode==="companion"?" on":""}`} onClick={() => sw("companion")}>COMPAGNON PAS À PAS</button>
      </div>
      {mode==="reference"
        ? <RefMode key={pid} pid={pid} p={p} sel={sel} onSel={os} g={g}/>
        : <CompMode key={`${pid}-${ck}`} pid={pid} p={p} sel={sel} onSel={os} g={g}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
